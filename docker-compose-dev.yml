# Única sustitución de entorno: INFRA_HOST (definir al ejecutar compose, p. ej. GitHub Actions → vars.INFRA_HOST).
# RabbitMQ :5672, OTLP :4317, Loki :3100, Consul :8500 en ese host.

services:

  # --- PostgreSQL - Security Service ----------------------------------------
  security-postgres:
    image: postgres:15
    container_name: security-postgres
    restart: always
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: dp_db_user
      POSTGRES_PASSWORD: DpG002
    volumes:
      - security_postgres_data:/var/lib/postgresql/data
    ports:
      - "5011:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_db_user -d security"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nutricenter_net

  # --- API Security Microservice --------------------------------------------
  api-security:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-security:dev
    container_name: api-security
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:5001"
      ConnectionStrings__DefaultConnection: "Host=security-postgres;Port=5432;Database=security;Username=dp_db_user;Password=DpG002;"
      RabbitMQ__HostName: ${INFRA_HOST}
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: admin
      RabbitMQ__Password: admin
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: ms-security-queue
      RabbitMQ__PatientCreatedRoutingKey: patient.created
      RabbitMQ__PatientUpdatedRoutingKey: patient.updated
      RabbitMQ__ReconnectDelaySeconds: "5"
      RabbitMQ__MaxReconnectAttempts: "0"
      Telemetry__ServiceName: api-security
      Telemetry__OtlpEndpoint: http://${INFRA_HOST}:4317
      Loki__Uri: http://${INFRA_HOST}:3100
      Consul__Host: http://${INFRA_HOST}:8500
      Consul__ServiceName: api-security
      Consul__ServiceAddress: api-security
      Consul__ServicePort: "5001"
    ports:
      - "5001:5001"
    depends_on:
      security-postgres:
        condition: service_healthy
    networks:
      - nutricenter_net

  # --- Worker Security (Outbox + RabbitMQ consumer) -----------------------
  security-worker:
    build:
      context: .
      dockerfile: src/api_security.WorkerService/Dockerfile
    image: security-worker:dev
    container_name: security-worker
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=security-postgres;Port=5432;Database=security;Username=dp_db_user;Password=DpG002;"
      RabbitMQ__HostName: ${INFRA_HOST}
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: admin
      RabbitMQ__Password: StrongPassword123
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: ms-security-queue
      RabbitMQ__PatientCreatedRoutingKey: patient.created
      RabbitMQ__PatientUpdatedRoutingKey: patient.updated
      RabbitMQ__ReconnectDelaySeconds: "5"
      RabbitMQ__MaxReconnectAttempts: "0"
    depends_on:
      security-postgres:
        condition: service_healthy
    networks:
      - nutricenter_net

networks:
  nutricenter_net:
    external: true
    name: develop_nutricenter_net

volumes:
  security_postgres_data:
