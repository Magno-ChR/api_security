services:
  postgres:
    image: postgres:15
    container_name: postgres_patient
    restart: always
    environment:
      POSTGRES_DB: "security"
      POSTGRES_USER: "dp_db_user"
      POSTGRES_PASSWORD: "DpG002"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  api-security:
    image: geonmagno/api_security:0.1.0
    container_name: api-security
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=security;Username=dp_db_user;Password=DpG002;
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
