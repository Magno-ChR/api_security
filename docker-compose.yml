services:

  # ─── PostgreSQL - Security Service ────────────────────────────────────────
  security-postgres:
    image: postgres:15
    container_name: security-postgres
    restart: always
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: dp_db_user
      POSTGRES_PASSWORD: DpG002
    networks:
      - shared-network
    volumes:
      - security_postgres_data:/var/lib/postgresql/data
    ports:
      - "5011:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_db_user -d security"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 15s

  # ─── API Security Microservice ────────────────────────────────────────────
  api-security:
    image: geonmagno/api_security:0.1.6
    container_name: api-security
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:5001"
      ConnectionStrings__DefaultConnection: "Host=security-postgres;Port=5432;Database=security;Username=dp_db_user;Password=DpG002;"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: admin
      RabbitMQ__Password: StrongPassword123
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: ms-security-queue
      RabbitMQ__ReconnectDelaySeconds: 5
      RabbitMQ__MaxReconnectAttempts: 0
    networks:
      - nutricenter_net
      - ms_infrastructure_net  # Para resolver hostname "rabbitmq" (contenedor de ms-infrastructure)
    ports:
      - "5001:5001"
    depends_on:
      security-postgres:
        condition: service_healthy

# ─── Network compartida para microservicios ────────────────────────────────
networks:
  nutricenter_net:
    driver: bridge
  ms_infrastructure_net:
    external: true
    name: ms-infrastructure_nutricenter_net

# ─── Volumen persistente ────────────────────────────────────────────────────
volumes:
  security_postgres_data: