services:

  # ─── PostgreSQL - Security Service ────────────────────────────────────────
  security-postgres:
    image: postgres:15
    container_name: security-postgres
    restart: always
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: dp_db_user
      POSTGRES_PASSWORD: DpG002
    networks:
      - microservices_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_db_user -d security"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── API Security Microservice ────────────────────────────────────────────
  api-security:
    image: geonmagno/api_security:0.1.1
    container_name: api-security
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=security;Username=dp_db_user;Password=DpG002;"
    networks:
      - microservices_net
    ports:
      - "5000:5000"
    depends_on:
      security-postgres:
        condition: service_healthy

# ─── Network compartida para microservicios ────────────────────────────────
networks:
  microservices_net:
    driver: bridge

# ─── Volumen persistente ────────────────────────────────────────────────────
volumes:
  postgres_data: